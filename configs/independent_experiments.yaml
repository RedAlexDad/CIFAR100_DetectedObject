# ============================================================================
# КОНФИГУРАЦИЯ ДЛЯ ТРЕХ НЕЗАВИСИМЫХ ЭКСПЕРИМЕНТОВ
# Все параметры аугментации меняются синхронно (10 уровней)
# ============================================================================

name: "independent_experiments"
description: "Три независимых эксперимента с синхронизированным перебором аугментации"

# ============================================================================
# БАЗОВАЯ АРХИТЕКТУРА МОДЕЛИ
# ============================================================================
base_architecture:
  - type: Conv2d
    args: [3, 32, 3, 1, 1]
  - type: ReLU
  - type: Dropout2d
    args: [0.20]
  - type: Conv2d
    args: [32, 64, 3, 1, 1]
  - type: ReLU
  - type: AvgPool2d
    args: [2]
  - type: Dropout2d
    args: [0.30]
  - type: AdaptiveAvgPool2d
    args: [1]
  - type: Flatten
  - type: Linear
    args: [64, 3]

# ============================================================================
# БАЗОВЫЕ ГИПЕРПАРАМЕТРЫ
# ============================================================================
hyperparameters:
  learning_rate: 0.005
  momentum: 0.9
  batch_size: 128
  epochs: 500
  label_smoothing: 0.1
  scheduler:
    type: StepLR
    step_size: 240
    gamma: 0.5

# ============================================================================
# БАЗОВАЯ АУГМЕНТАЦИЯ (уровень 5 из 10)
# ============================================================================
base_augmentation:
  brightness: [0.90, 1.10]
  contrast: [0.90, 1.10]
  saturation: [0.80, 1.20]
  hue: null
  rotation: [-15.0, 15.0]
  translate: [0.10, 0.10]
  scale: [0.80, 1.20]
  shear: [-5.0, 5.0]

# ============================================================================
# ЭКСПЕРИМЕНТ 1: ПЕРЕБОР DROPOUT
# dropout_1 фиксирован, dropout_2 меняется с шагом 0.05
# ============================================================================
experiment_1_dropout:
  name: "dropout_search"
  description: "Перебор dropout_2 (шаг 0.05, 10 значений), dropout_1 фиксирован"

  # dropout_1: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50]
  # dropout_1 фиксирован на уровне 0.20
  dropout_1: 0.20
  
  # dropout_2 перебирается: 0.05, 0.10, ..., 0.50 (10 значений)
  dropout_2: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50]

  weight_decay: 1e-5
  augmentation: null

# ============================================================================
# ЭКСПЕРИМЕНТ 2: ПЕРЕБОР WEIGHT DECAY
# ============================================================================
experiment_2_weight_decay:
  name: "weight_decay_search"
  description: "Перебор weight decay (логарифмический шаг, 10 значений)"
  
  # 10 значений: от 1e-7 до 1e-4 (логарифмическая шкала)
  weight_decay: [1e-7, 3e-7, 1e-6, 3e-6, 1e-5, 3e-5, 1e-4, 3e-4, 1e-3, 3e-3]
  
  dropout_1: 0.20
  dropout_2: 0.30
  augmentation: null

# ============================================================================
# ЭКСПЕРИМЕНТ 3: ПЕРЕБОР АУГМЕНТАЦИИ (10 синхронизированных уровней)
# ============================================================================
experiment_3_augmentation:
  name: "augmentation_search"
  description: "Перебор аугментации (10 уровней, все параметры синхронно)"
  
  # 10 уровней аугментации - все параметры меняются синхронно
  # Уровень 0 = минимальная, Уровень 9 = максимальная
  augmentation_levels:
    # Уровень 0 (минимальная аугментация)
    - brightness: [0.95, 1.05]
      contrast: [0.95, 1.05]
      saturation: [0.90, 1.10]
      rotation: [-5.0, 5.0]
      translate: [0.05, 0.05]
      scale: [0.90, 1.10]
      shear: [-1.0, 1.0]
    
    # Уровень 1
    - brightness: [0.93, 1.07]
      contrast: [0.93, 1.07]
      saturation: [0.87, 1.13]
      rotation: [-7.2, 7.2]
      translate: [0.07, 0.07]
      scale: [0.87, 1.13]
      shear: [-1.6, 1.6]
    
    # Уровень 2
    - brightness: [0.91, 1.09]
      contrast: [0.91, 1.09]
      saturation: [0.83, 1.17]
      rotation: [-9.4, 9.4]
      translate: [0.09, 0.09]
      scale: [0.83, 1.17]
      shear: [-2.2, 2.2]
    
    # Уровень 3
    - brightness: [0.89, 1.11]
      contrast: [0.89, 1.11]
      saturation: [0.80, 1.20]
      rotation: [-11.7, 11.7]
      translate: [0.11, 0.11]
      scale: [0.80, 1.20]
      shear: [-2.8, 2.8]
    
    # Уровень 4
    - brightness: [0.87, 1.13]
      contrast: [0.87, 1.13]
      saturation: [0.77, 1.23]
      rotation: [-13.9, 13.9]
      translate: [0.13, 0.13]
      scale: [0.77, 1.23]
      shear: [-3.4, 3.4]
    
    # Уровень 5 (базовая аугментация)
    - brightness: [0.85, 1.15]
      contrast: [0.85, 1.15]
      saturation: [0.73, 1.27]
      rotation: [-16.1, 16.1]
      translate: [0.15, 0.15]
      scale: [0.73, 1.27]
      shear: [-4.0, 4.0]
    
    # Уровень 6
    - brightness: [0.83, 1.17]
      contrast: [0.83, 1.17]
      saturation: [0.70, 1.30]
      rotation: [-18.3, 18.3]
      translate: [0.17, 0.17]
      scale: [0.70, 1.30]
      shear: [-4.6, 4.6]
    
    # Уровень 7
    - brightness: [0.81, 1.19]
      contrast: [0.81, 1.19]
      saturation: [0.67, 1.33]
      rotation: [-20.6, 20.6]
      translate: [0.19, 0.19]
      scale: [0.67, 1.33]
      shear: [-5.2, 5.2]
    
    # Уровень 8
    - brightness: [0.79, 1.21]
      contrast: [0.79, 1.21]
      saturation: [0.63, 1.37]
      rotation: [-22.8, 22.8]
      translate: [0.21, 0.21]
      scale: [0.63, 1.37]
      shear: [-5.8, 5.8]
    
    # Уровень 9 (максимальная аугментация)
    - brightness: [0.77, 1.23]
      contrast: [0.77, 1.23]
      saturation: [0.60, 1.40]
      rotation: [-25.0, 25.0]
      translate: [0.23, 0.23]
      scale: [0.60, 1.40]
      shear: [-6.4, 6.4]
  
  dropout_1: 0.20
  dropout_2: 0.30
  weight_decay: 1e-5

# ============================================================================
# НАСТРОЙКИ
# ============================================================================
settings:
  output_dir: "tensorboard"
  max_combinations: 100
  random_sample: false
  save_only_best: false
